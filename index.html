<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz Doğum Günü!</title>
    <style>
        /* Genel sayfa ayarları: Sade ve göz yormayan renkler */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; /* Yumuşak bir gri/mavi tonu */
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Sayaç tasarımı */
        .timer-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .time-box {
            background: #ffffff;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-width: 70px;
        }

        .time-box span {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
            color: #e74c3c; /* Tatlı bir kırmızı tonu */
        }

        .time-box .label {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Konum bilgisi tasarımı */
        .location {
            position: absolute;
            bottom: 40px;
            font-size: 1.2rem;
            color: #34495e;
            background: #e8ecef;
            padding: 12px 25px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }

        /* Telefon ekranları için küçültme ayarları */
        @media (max-width: 600px) {
            .timer-container {
                gap: 10px;
            }
            .time-box {
                padding: 15px 15px;
                min-width: 50px;
            }
            .time-box span {
                font-size: 1.8rem;
            }
            h1 {
                font-size: 1.8rem;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>

    <h1>Büyük Güne Geri Sayım! 🎉</h1>

    <div class="timer-container" id="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Gün</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Saat</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Dakika</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Saniye</div>
        </div>
    </div>

    <div class="location">
        📍 Konum: <strong>moda 2</strong>
    </div>

    <script>
        // Hedef tarih: 1 Temmuz 18:00
        // Bulunduğumuz yılı otomatik alması için Date nesnesi kullanıyoruz
        const currentYear = new Date().getFullYear();
        const targetDate = new Date(`July 1, ${currentYear} 18:00:00`).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Zaman dolduğunda sayacı durdur ve mesaj göster
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h2>Vakit Geldi! İyi Eğlenceler! 🎈</h2>";
                return;
            }

            // Gün, saat, dakika ve saniye hesaplamaları
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Değerleri HTML içine yazdır (tek haneliyse başına 0 ekle)
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>

</body>
</html>
