<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil cihazlar için ekrana tam oturmasını ve uygulama gibi hissettirmesini sağlayan ayar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doğum Günüme Gelir Misin?</title>
    <style>
        /* Koyu Tema (Dark Mode) Ayarları */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Tam siyah/koyu gri arka plan */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Resim Tasarımı */
        .hamster-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%; /* Resmi yuvarlak yapar, istersen bu satırı silebilirsin */
            margin-bottom: 20px;
            border: 3px solid #2a2a2a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        /* Başlık */
        h1 {
            font-size: 1.8rem;
            color: #e0e0e0;
            margin-bottom: 35px;
            font-weight: 600;
            padding: 0 20px;
            letter-spacing: 0.5px;
        }

        /* TELEFON İÇİN SAYAÇ TASARIMI (2x2 Grid Sistemi) */
        .timer-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Telefondan girildiğinde 2 alt, 2 üst kutu olur */
            gap: 15px;
            width: 85%;
            max-width: 320px;
            margin-bottom: 90px; /* Alttaki konum yazısıyla karışmaması için boşluk */
        }

        .time-box {
            background: #1e1e1e; /* Koyu gri kutu arka planı */
            padding: 20px 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time-box span {
            display: block;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff6b6b; /* Koyu temada çok şık duran pastel kırmızı/pembe tonu */
        }

        .time-box .label {
            font-size: 0.85rem;
            color: #aaaaaa;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Konum bilgisi tasarımı */
        .location {
            position: absolute;
            bottom: 30px;
            font-size: 1.1rem;
            color: #cccccc;
            background: #1e1e1e;
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid #333;
            letter-spacing: 0.5px;
            width: 75%;
            max-width: 250px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* Tablet veya bilgisayardan girilirse 4'lü yan yana olması için ayar */
        @media (min-width: 600px) {
            .timer-container {
                grid-template-columns: repeat(4, 1fr);
                max-width: 600px;
            }
            .hamster-img {
                width: 180px;
                height: 180px;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Üzgün hamster resmi -->
    <img src="uzgunhamster.jpg" alt="Üzgün Hamster" class="hamster-img">
    
    <!-- Başlık -->
    <h1>Doğum Günüme gelir misin</h1>

    <!-- Sayaç -->
    <div class="timer-container" id="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Gün</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Saat</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Dakika</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Saniye</div>
        </div>
    </div>
    <div style="position: absolute; bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%;">
    <div class="location" style="position: static; color: #ffd966; border-color: #555;">
        🎂 Gelenlere beleş kek!
    </div>
    <div class="location" style="position: static;">
        📍 Konum: <strong>moda 2</strong>
    </div>
    </div>
    <script>
        // Hedef tarih: 1 Temmuz 18:00
        const currentYear = new Date().getFullYear();
        const targetDate = new Date(`July 1, ${currentYear} 18:00:00`).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Zaman dolduğunda sayacı durdur ve mesaj göster
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h2 style='grid-column: span 2; color: #ff6b6b; font-size: 1.5rem;'>Vakit Geldi! Bekliyoruz...</h2>";
                return;
            }

            // Gün, saat, dakika ve saniye hesaplamaları
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Değerleri HTML içine yazdır
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>

</body>
</html>
