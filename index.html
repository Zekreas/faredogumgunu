<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doğum Günüme Gelir Misin?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('gokkusagi.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #111111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow-x: hidden;
        }

        .hamster-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            color: #111111;
            margin-bottom: 35px;
            font-weight: 700;
            padding: 0 20px;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(255,255,255,0.6);
        }

        .timer-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 85%;
            max-width: 320px;
            margin-bottom: 90px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 20px 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time-box span {
            display: block;
            font-size: 2.2rem;
            font-weight: bold;
            color: #cc0000;
        }

        .time-box .label {
            font-size: 0.85rem;
            color: #222222;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .bottom-section {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .location {
            font-size: 1.1rem;
            color: #111111;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
            width: 75%;
            max-width: 250px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        .location strong {
            color: #000000;
        }

        .location.cake {
            color: #7a3800;
        }

        @media (min-width: 600px) {
            .timer-container {
                grid-template-columns: repeat(4, 1fr);
                max-width: 600px;
            }
            .hamster-img {
                width: 180px;
                height: 180px;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <img src="uzgunhamster.jpg" alt="Üzgün Hamster" class="hamster-img">
    
    <h1>Doğum Günüme gelir misin</h1>

    <div class="timer-container" id="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Gün</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Saat</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Dakika</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Saniye</div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="location cake">
            🎂 Gelenlere beleş kek!
        </div>
        <div class="location">
            📍 Konum: <strong>https://maps.app.goo.gl/kzx2da2XqfAqVTrw8 (Tarih: 1 temmuz)</strong>
        </div>
    </div>

    <script>
        const currentYear = new Date().getFullYear();
        const targetDate = new Date(`July 1, ${currentYear} 18:00:00`).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h2 style='grid-column: span 2; color: #cc0000; font-size: 1.5rem;'>Vakit Geldi! Bekliyoruz...</h2>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>

</body>
</html>
